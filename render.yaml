services:
  - type: web
    name: ascend
    runtime: python
    rootDir: emotional_journey
    buildCommand: pip install -r requirements.txt && python -m src.data_pipeline
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: ASCEND_JWT_SECRET
        generateValue: true
      - key: ASCEND_BASE_URL
        value: https://ascend.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
